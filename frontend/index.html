<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore Auth - Frontend</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 600px; margin-top: 50px; }
        .alert { margin-top: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Bookstore Auth</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#" onclick="showSection('register')">Đăng ký</a>
                <a class="nav-link" href="#" onclick="showSection('login')">Đăng nhập</a>
                <a class="nav-link d-none" id="profileLink" href="#" onclick="showSection('profile')">Profile</a>
                <a class="nav-link d-none" id="logoutLink" href="#" onclick="logout()">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Register Section -->
        <div id="registerSection" class="section">
            <h2 class="mb-4">Đăng ký tài khoản</h2>
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" class="form-control" id="regUsername" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="regEmail" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" id="regPassword" required>
                </div>
                <button type="submit" class="btn btn-primary">Đăng ký</button>
            </form>
            <div id="registerAlert" class="alert d-none"></div>
        </div>

        <!-- Login Section -->
        <div id="loginSection" class="section d-none">
            <h2 class="mb-4">Đăng nhập</h2>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="loginEmail" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary">Đăng nhập</button>
            </form>
            <div id="loginAlert" class="alert d-none"></div>
        </div>

        <!-- Profile Section -->
        <div id="profileSection" class="section d-none">
            <h2 class="mb-4">Thông tin cá nhân</h2>
            <div id="profileInfo" class="card">
                <div class="card-body">
                    <h5 class="card-title">Profile</h5>
                    <p class="card-text" id="profileDetails">Loading...</p>
                </div>
            </div>
            <div id="profileAlert" class="alert d-none"></div>
        </div>

        <!-- Password Change Section -->
        <div id="passwordSection" class="section d-none">
            <h2 class="mb-4">Đổi mật khẩu</h2>
            <form id="passwordForm">
                <div class="mb-3">
                    <label class="form-label">Mật khẩu cũ</label>
                    <input type="password" class="form-control" id="oldPassword" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu mới</label>
                    <input type="password" class="form-control" id="newPassword" required>
                </div>
                <button type="submit" class="btn btn-primary">Đổi mật khẩu</button>
            </form>
            <div id="passwordAlert" class="alert d-none"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
</body>
</html>
